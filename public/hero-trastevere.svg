<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Illustrazione di Trastevere, Roma">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbeede"/>
      <stop offset="0.55" stop-color="#f3c98b"/>
      <stop offset="1" stop-color="#e0a24a"/>
    </linearGradient>
    <linearGradient id="roofs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c96a41"/>
      <stop offset="1" stop-color="#a94e30"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#sky)"/>

  <!-- sole caldo -->
  <circle cx="620" cy="150" r="70" fill="#fff3df" opacity="0.85"/>
  <circle cx="620" cy="150" r="46" fill="#fde3b8"/>

  <!-- colline morbide sullo sfondo -->
  <path d="M0 300 Q200 250 400 290 T800 280 V450 H0 Z" fill="#d98a52" opacity="0.55"/>

  <!-- profilo dei tetti di Trastevere -->
  <path d="M0 360 h90 v-40 h70 v40 h50 v-70 h40 v70 h60 v-30 h80 v30 h70 v-55 h30 v55 h120 v-35 h60 v35 h80 v450 H0 Z" fill="url(#roofs)"/>

  <!-- cupola (richiamo a una basilica) -->
  <g fill="#b85c3c">
    <path d="M470 300 a45 55 0 0 1 90 0 z"/>
    <rect x="505" y="250" width="20" height="30" rx="4"/>
    <circle cx="515" cy="248" r="7"/>
  </g>
  <rect x="450" y="300" width="130" height="150" fill="#a94e30"/>

  <!-- finestrelle -->
  <g fill="#fbeede" opacity="0.8">
    <rect x="40" y="380" width="16" height="22" rx="3"/>
    <rect x="120" y="360" width="16" height="22" rx="3"/>
    <rect x="250" y="330" width="16" height="22" rx="3"/>
    <rect x="360" y="360" width="16" height="22" rx="3"/>
    <rect x="640" y="350" width="16" height="22" rx="3"/>
    <rect x="720" y="360" width="16" height="22" rx="3"/>
    <rect x="486" y="340" width="18" height="26" rx="4"/>
    <rect x="526" y="340" width="18" height="26" rx="4"/>
  </g>
</svg>
